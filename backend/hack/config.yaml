
# CLI tool, only in development environment.
# https://goframe.org/docs/cli
gfcli:
  gen:
    dao:
      - link: "mysql:root:12345678@tcp(127.0.0.1:3306)/test"
        descriptionTag: true

  docker:
    build: "-a amd64 -s linux -p temp -ew"
    tagPrefixes:
      - my.image.pub/my-app

server:
  address: ":8080"

clients:
  k8s:
    enabled: false
    namespace: "aigateway-system"
    kubectlBin: "kubectl"
    kubeconfig: ""
    resourcePrefix: "aigw-console"
  portaldb:
    enabled: false
    driver: "mysql"
    dsn: ""
    autoMigrate: true
  grafana:
    enabled: false
    baseURL: ""
    username: ""
    password: ""
