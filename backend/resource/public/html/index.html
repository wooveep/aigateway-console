<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AIGateway Console Backend</title>
    <style>
      body {
        margin: 0;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #f4efe4 0%, #dbe5d8 100%);
        color: #1f2a1f;
      }
      main {
        max-width: 840px;
        margin: 8vh auto;
        padding: 32px;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 42px;
      }
      p {
        line-height: 1.6;
        font-size: 18px;
      }
      code {
        background: rgba(31, 42, 31, 0.08);
        padding: 2px 6px;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>AIGateway Console Backend</h1>
      <p>
        This GoFrame backend is the active migration target for the old Java
        control plane now preserved in <code>backend-java-legacy/</code>.
      </p>
      <p>
        Current phase: <code>P1-goframe-foundation</code>. Next steps are
        migrating platform core, gateway resources, Portal DB domains, and
        reconcile jobs in phases.
      </p>
    </main>
  </body>
</html>
