apiVersion: 1.0.0
info:
  type: oss
  category: ai
  image: platform_wasm/ai-data-masking
  name: ai-data-masking
  title: AI data masking
  x-title-i18n:
    zh-CN: AI 数据脱敏
  description: Intercept, replace, and restore sensitive information in requests/responses.
  x-description-i18n:
    zh-CN: 对请求/响应中的敏感信息进行拦截、替换、还原
  iconUrl: https://img.alicdn.com/imgextra/i1/O1CN018iKKih1iVx287RltL_!!6000000004419-2-tps-42-42.png
  version: 2.0.0
  contact:
    name: johnlanni
  gatewayMinVersion: "2.0.0"    
spec:
  phase: AUTHN
  priority: 100
  configSchema:
    openAPIV3Schema:
      type: object
      properties:
        deny_openai:
          type: boolean
          title: OpenAI协议拦截
          x-title-i18n:
            en-US: OpenAI Protocol Interception
          description: 对openai协议进行拦截
          x-description-i18n:
            en-US: Intercept OpenAI protocol
          default: true
        deny_jsonpath:
          type: array
          title: JsonPath拦截
          x-title-i18n:
            en-US: JsonPath Interception
          description: 对指定jsonpath拦截
          x-description-i18n:
            en-US: Intercept specified JsonPath
          items:
            type: string
          default: []
        deny_raw:
          type: boolean
          title: 原始Body拦截
          x-title-i18n:
            en-US: Raw Body Interception
          description: 对原始body拦截
          x-description-i18n:
            en-US: Intercept raw body
          default: false
        system_deny:
          type: boolean
          title: 系统拦截规则
          x-title-i18n:
            en-US: System Interception Rules
          description: 开启内置拦截规则
          x-description-i18n:
            en-US: Enable built-in interception rules
          default: false
        system_deny_words:
          type: array
          title: 系统拦截词库
          x-title-i18n:
            en-US: System Interception Dictionary
          description: Console 投影的系统拦截词库
          x-description-i18n:
            en-US: Console-projected system interception dictionary
          items:
            type: string
        deny_code:
          type: integer
          title: 拦截状态码
          x-title-i18n:
            en-US: Interception Status Code
          description: 拦截时http状态码
          x-description-i18n:
            en-US: HTTP status code when intercepted
          default: 200
        deny_message:
          type: string
          title: AI拦截消息
          x-title-i18n:
            en-US: AI Interception Message
          description: 拦截时ai返回消息
          x-description-i18n:
            en-US: AI response message when intercepted
          default: "提问或回答中包含敏感词，已被屏蔽"
        deny_raw_message:
          type: string
          title: 非AI拦截消息
          x-title-i18n:
            en-US: Non-AI Interception Message
          description: 非openai拦截时返回内容
          x-description-i18n:
            en-US: Response content for non-OpenAI interception
          default: "{\"errmsg\":\"提问或回答中包含敏感词，已被屏蔽\"}"
        deny_content_type:
          type: string
          title: 拦截返回类型
          x-title-i18n:
            en-US: Interception Response Type
          description: 非openai拦截时返回content_type头
          x-description-i18n:
            en-US: Content-Type header for non-OpenAI interception
          default: "application/json"
      example:
        system_deny: false
        deny_openai: true
        deny_jsonpath:
          - "$.messages[*].content"
        deny_message: "Question or answer contains sensitive words and has been blocked."
  routeConfigSchema:
    openAPIV3Schema:
      type: object
      properties:
        deny_openai:
          type: boolean
          title: OpenAI协议拦截
          x-title-i18n:
            en-US: OpenAI Protocol Interception
          description: 对openai协议进行拦截
          x-description-i18n:
            en-US: Intercept OpenAI protocol
          default: true
        deny_jsonpath:
          type: array
          title: JsonPath拦截
          x-title-i18n:
            en-US: JsonPath Interception
          description: 对指定jsonpath拦截
          x-description-i18n:
            en-US: Intercept specified JsonPath
          items:
            type: string
          default: []
        deny_raw:
          type: boolean
          title: 原始Body拦截
          x-title-i18n:
